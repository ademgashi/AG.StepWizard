name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: nuget restore src/AG.StepWizard.sln

      - name: Build
        run: msbuild src/AG.StepWizard.sln /p:Configuration=Release /m

      - name: Pack
        run: dotnet pack src/AG.StepWizard/AG.StepWizard.csproj -c Release -o artifacts
