name: Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-nuget:
    runs-on: windows-latest
    environment: nuget
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: nuget restore src/AG.StepWizard.sln

      - name: Build
        run: msbuild src/AG.StepWizard.sln /p:Configuration=Release /m

      - name: Pack
        run: dotnet pack src/AG.StepWizard/AG.StepWizard.csproj -c Release -o artifacts --no-build

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: AG.StepWizard-nuget
          path: artifacts/*.nupkg

      - name: NuGet login with Trusted Publishing
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish to NuGet
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
